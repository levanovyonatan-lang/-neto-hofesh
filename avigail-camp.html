<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>קייטנת אקשן עם אביגיל</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-purple: #8A2BE2;
            --brand-purple-dark: #3b0a70;
            --whatsapp-green: #25D366;
            --whatsapp-green-dark: #1da851;
            --text-dark: #1A1A2E;
            --text-light: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            overflow-x: hidden;
            width: 100%;
        }

        body {
            font-family: 'Rubik', sans-serif;
            background-color: #0d0118;
            color: var(--text-dark);
            width: 100%;
            max-width: 100vw;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            height: 100vh;
            height: -webkit-fill-available;
            overflow-x: hidden;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Animated Glowing Orbs Background */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            z-index: -1;
            animation: floatOrb 10s infinite alternate ease-in-out;
        }
        .orb-1 {
            width: 300px;
            height: 300px;
            background: #E100FF;
            top: -10%;
            left: -20%;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 250px;
            height: 250px;
            background: #00D2FF;
            bottom: 20%;
            right: -10%;
            animation-delay: -3s;
        }
        .orb-3 {
            width: 200px;
            height: 200px;
            background: #7F00FF;
            top: 40%;
            left: 20%;
            animation-delay: -6s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -40px) scale(1.2); }
        }

        /* Video Hero Section */
        .video-container {
            width: calc(56vh * (9 / 16));
            max-width: 90%;
            height: 56vh; 
            background-color: #000;
            position: relative;
            box-shadow: 0 15px 45px rgba(225, 0, 255, 0.3), 0 0 20px rgba(0, 210, 255, 0.2);
            border-radius: 24px;
            overflow: hidden;
            margin: 25px auto 0 auto;
            flex-shrink: 0;
            border: 2px solid rgba(255, 255, 255, 0.15);
            animation: dropIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(-20px);
            z-index: 2;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes dropIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Content Section - Glassmorphism */
        .content-container {
            flex: 1;
            width: 100%;
            max-width: 450px; 
            padding: 20px 20px 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 12px;
            
            /* Glassmorphism Effect */
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255,255,255,0.8);
            
            border-radius: 35px 35px 0 0;
            margin: -20px auto 0 auto; /* Ensure centered in Safari */
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
            z-index: 10;
            
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s forwards;
            opacity: 0;
            transform: translateY(40px);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Badge */
        .badge {
            background: linear-gradient(90deg, #FF007A, #7F00FF);
            color: white;
            font-size: 0.85rem;
            font-weight: 800;
            padding: 6px 14px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(255, 0, 122, 0.3);
            display: inline-flex;
            align-items: center;
            direction: rtl;
            flex-direction: row;
            margin-bottom: -5px;
            gap: 8px;
        }

        /* FOMO Text */
        .fomo-text {
            font-size: 1.4rem;
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 15px;
            
            /* Gradient Text */
            background: linear-gradient(135deg, #1A1A2E, #6A1CB3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Buttons */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px 20px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 800;
            text-decoration: none;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            direction: rtl;
            flex-direction: row;
            gap: 12px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Primary CTA (WhatsApp) */
        .btn-whatsapp {
            background: linear-gradient(90deg, var(--whatsapp-green), #28E16E);
            color: white;
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
            border: none;
        }

        /* Animated Shine on WhatsApp Button */
        .btn-whatsapp::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            transform: skewX(-20deg);
            animation: shine 4s infinite cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .whatsapp-icon {
            width: 26px;
            height: 26px;
            margin: 0;
            fill: currentColor;
        }

        /* Secondary CTA (Registration) */
        .btn-registration {
            background-color: rgba(106, 28, 179, 0.05);
            color: #6A1CB3;
            border: 2px solid #6A1CB3;
            box-shadow: 0 4px 10px rgba(106, 28, 179, 0.15);
            margin-top: 5px;
        }

        .btn-registration:hover {
            background-color: rgba(106, 28, 179, 0.15);
        }

        /* Adjustments for very small screens */
        @media (max-height: 650px) {
            .video-container {
                height: 52vh;
                width: calc(52vh * (9 / 16));
                margin: 10px auto 0 auto;
            }
            .content-container {
                padding: 15px 15px 20px;
                gap: 8px;
            }
            .fomo-text {
                font-size: 1.15rem;
            }
            .btn {
            padding: 12px 15px;
            font-size: 1.05rem;
        }
    }

    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }
    </style>
</head>
<body>

    <!-- Animated Background Orbs -->
    <div class="bg-container">
        <div class="bg-orb orb-1"></div>
        <div class="bg-orb orb-2"></div>
        <div class="bg-orb orb-3"></div>
    </div>

    <!-- Main Video Hero -->
    <div class="video-container" style="position: relative;">
        <video id="avigail-vid" playsinline loop controls poster="assets/images/avigail-poster-new.jpeg">
            <source src="assets/videos/abigail-video.mp4" type="video/mp4">
            דפדפן זה אינו תומך בווידאו.
        </video>
        
        <!-- Play Overlay -->
        <div id="play-overlay" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.65); z-index: 10; cursor: pointer; backdrop-filter: blur(2px);">
            <div style="color: white; font-weight: 900; font-size: 1.6rem; display: flex; flex-direction: column; align-items: center; gap: 12px; animation: pulse 2.5s infinite; text-shadow: 0 4px 20px rgba(0,0,0,0.9); text-align: center;">
                <span style="font-size: 3.5rem; filter: drop-shadow(0 0 15px rgba(255,255,255,0.4)); line-height: 1;">▶️</span>
                <span>לחצו לתחילת הסרטון</span>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.getElementById('avigail-vid');
            const overlay = document.getElementById('play-overlay');
            
            if(overlay && video) {
                overlay.addEventListener('click', function() {
                    video.play();
                });

                video.addEventListener('play', function() {
                    overlay.style.display = 'none';
                });
            }
        });
    </script>

    <!-- Content & CTA Actions -->
    <div class="content-container">
        
        <div class="badge">
            <span dir="rtl">מהרו להירשם לקייטנה!</span>
            <span class="icon">✨</span>
        </div>

        <!-- Scarcity / FOMO Text -->
        <div class="fomo-text">
            מספר המקומות מוגבל 🏃‍♂️🏃‍♀️
        </div>

        <!-- Primary Call-to-Action (WhatsApp) -->
        <a href="https://wa.me/?text=%D7%9E%D7%A6%D7%90%D7%AA%D7%99%20%D7%90%D7%AA%20%D7%94%D7%A7%D7%99%D7%99%D7%98%D7%A0%D7%94%20%D7%94%D7%9B%D7%99%20%D7%A9%D7%95%D7%95%D7%94%20%D7%9C%D7%A7%D7%99%D7%A5%20-%20%D7%A7%D7%99%D7%99%D7%98%D7%A0%D7%AA%20%D7%90%D7%A7%D7%A9%D7%9F%20%D7%A2%D7%9D%20%D7%90%D7%91%D7%99%D7%92%D7%99%D7%9C.%20%D7%90%D7%A0%D7%99%20%D7%9E%D7%9E%D7%A9%20%D7%A8%D7%95%D7%A6%D7%94%20%D7%9C%D7%9C%D7%9B%D7%AA%2C%20%D7%91%D7%91%D7%A7%D7%A9%D7%94%20%D7%AA%D7%A8%D7%A9%D7%9E%D7%95%20%D7%90%D7%95%D7%AA%D7%99!%0A%D7%94%D7%A0%D7%94%20%D7%94%D7%9C%D7%99%D7%A0%D7%A7%20%D7%9C%D7%A4%D7%A8%D7%98%D7%99%D7%9D%3A%20https%3A%2F%2Fwww.funkid-k.com%2F%D7%A7%D7%99%D7%99%D7%98%D7%A0%D7%AA-%D7%90%D7%A7%D7%A9%D7%9F-%D7%A2%D7%9D-%D7%90%D7%91%D7%99%D7%92%D7%99%D7%9C%2F" 
           class="btn btn-whatsapp" 
           target="_blank" 
           rel="noopener noreferrer"
           onclick="if(window.trackEvent) window.trackEvent('click_whatsapp_share_avigail');">
            <span dir="rtl">שלחו להורים</span>
            <svg class="whatsapp-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
                <!-- FontAwesome WhatsApp Icon Path -->
                <path d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.4 17.7 68.9 27 106.1 27h.1c122.3 0 224.1-99.6 224.1-222 0-59.3-25.2-115-67.1-157zM223.9 413.3c-33.1 0-65.5-8.9-94-25.7l-6.7-4-69.8 18.3L72 334.1l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 56.2 81.2 56.1 130.5 0 101.8-84.9 184.3-186.6 184.3zm101.2-138.2c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-32.6-16.3-54-29.1-75.5-66-5.7-9.8 5.7-9.1 16.3-30.3 1.8-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 35.2 15.2 49 16.5 66.6 13.9 10.7-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z"/>
            </svg>
        </a>

        <!-- Secondary Call-to-Action (Registration) -->
        <a href="https://www.funkid-k.com/%D7%A7%D7%99%D7%99%D7%98%D7%A0%D7%AA-%D7%90%D7%A7%D7%A9%D7%9F-%D7%A2%D7%9D-%D7%90%D7%91%D7%99%D7%92%D7%99%D7%9C/" 
           class="btn btn-registration" 
           target="_blank"
           onclick="if(window.trackEvent) window.trackEvent('click_registration_avigail');">
            פרטים והרשמה
        </a>
    </div>

</body>
</html>
