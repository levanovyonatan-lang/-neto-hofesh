<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>קייטנת אקשן עם אביגיל</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-purple: #8A2BE2;
            --brand-purple-dark: #6A1CB3;
            --whatsapp-green: #25D366;
            --whatsapp-green-dark: #128C7E;
            --text-dark: #333333;
            --bg-light: #F8F9FA;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Rubik', sans-serif;
            background: linear-gradient(135deg, #6A1CB3, #8A2BE2);
            color: var(--text-dark);
            height: 100vh;
            overflow: hidden; /* Prevent scrolling to keep it single-column, single-view */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Video Hero Section */
        .video-container {
            width: auto;
            max-width: 90%;
            height: 52vh; /* Leaves plenty of room for buttons */
            aspect-ratio: 9/16;
            background-color: #000;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            overflow: hidden;
            margin-top: 20px;
            flex-shrink: 0;
            border: 3px solid rgba(255, 255, 255, 0.4);
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Content Section */
        .content-container {
            flex: 1;
            width: 100%;
            max-width: 450px; /* Centered on larger screens */
            padding: 20px 20px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 12px;
            background-color: white;
            border-radius: 30px 30px 0 0;
            margin-top: 20px;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.15);
        }

        /* FOMO Text */
        .fomo-text {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--brand-purple);
            line-height: 1.3;
            margin-bottom: 10px;
            animation: pulseText 2s infinite;
        }

        @keyframes pulseText {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* Buttons */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 20px;
            border-radius: 50px;
            font-size: 1.15rem;
            font-weight: 800;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            border: none;
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* Primary CTA (WhatsApp) */
        .btn-whatsapp {
            background-color: var(--whatsapp-green);
            color: white;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }

        .btn-whatsapp:hover {
            background-color: var(--whatsapp-green-dark);
        }

        .whatsapp-icon {
            width: 28px;
            height: 28px;
            margin-left: 10px;
            fill: currentColor;
        }

        /* Secondary CTA (Registration) */
        .btn-registration {
            background-color: transparent;
            color: var(--brand-purple);
            border: 2px solid var(--brand-purple);
            margin-top: 5px;
        }

        .btn-registration:hover {
            background-color: var(--brand-purple);
            color: white;
        }

        /* Desktop specific tweaks (if opened on desktop) */
        @media (min-width: 768px) {
            body {
                background-color: #E9ECEF;
            }
            .video-container {
                max-width: 450px;
                height: 50vh;
                margin-top: 20px;
                border-radius: 20px 20px 0 0;
            }
            .content-container {
                background-color: white;
                border-radius: 0 0 20px 20px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.05);
                margin-bottom: 20px;
            }
        }
        
        /* Adjustments for very small screens */
        @media (max-height: 650px) {
            .video-container {
                height: 45vh;
            }
            .fomo-text {
                font-size: 1.1rem;
            }
            .btn {
                padding: 14px 20px;
                font-size: 1.05rem;
            }
        }
    </style>
</head>
<body>

    <!-- Main Video Hero -->
    <div class="video-container">

    </div>

</html>
